name: santvani_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8


  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7


  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  firebase_database: ^11.3.9
  firebase_storage: ^12.4.9
  firebase_messaging: ^15.2.9
  firebase_crashlytics: ^4.3.9
  firebase_app_check: ^0.3.2+9
  firebase_analytics: ^11.5.2


  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^6.1.5


  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0


  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0


  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.0
  google_fonts: ^6.3.0
  shimmer: ^3.0.0
  lottie: ^3.3.1
  cached_network_image: ^3.4.1


  go_router: ^16.1.0


  form_validator: ^2.1.1


  intl: ^0.20.2


  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  local_auth: ^2.3.0
  webview_flutter: ^4.13.0
  top_snackbar_flutter: ^3.3.0


  permission_handler: ^12.0.1


  image_picker: ^1.2.0
  intl_phone_field: ^3.2.0


  device_info_plus: ^11.5.0
  package_info_plus: ^8.3.1


  flutter_local_notifications: ^19.4.0


  url_launcher: ^6.3.2
  uuid: ^4.5.1
  logger: ^2.6.1
  flutter_sms: ^3.0.0


  flutter_animate: ^4.5.2


  dropdown_button2: ^2.3.9

  pin_code_fields: ^8.0.1

  audioplayers: ^6.1.0

  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


  freezed: ^3.2.0


  build_runner: ^2.7.0
  json_serializable: ^6.11.0


  flutter_native_splash: ^2.4.6


  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true

  assets:
    - assets/png/
    - assets/svg/
    - assets/audio/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_24pt-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_24pt-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/png/sanatan.png

flutter_native_splash:
  color: "#F8F5F2"
  image: assets/png/img_splash_logo.png

  android_12:
    image: assets/png/img_android_12_splash_logo.png
    color: "#F8F5F2"
